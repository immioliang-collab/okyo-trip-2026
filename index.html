    // ======================================================
    //  TRANSPORT MODAL
    // ======================================================
    function TransportModal({ day, onClose, apiKey }) {
      const [origin, setOrigin]           = useState(day.hotel === "無（退房）" ? day.spots[0] : day.hotel);
      const [destination, setDestination] = useState(day.spots[1] || day.spots[0] || "");
      const [mode, setMode]               = useState("transit");
      const [result, setResult]           = useState(null);
      const [loading, setLoading]         = useState(false);
      const [error, setError]             = useState("");

      const MODES = [
        { key: "transit",  label: "🚇 地鐵" },
        { key: "bus",      label: "🚌 巴士" },
        { key: "driving",  label: "🚕 計程車" },
        { key: "walking",  label: "🚶 步行" }
      ];

      const searchRoute = async () => {
        if (!apiKey) { setError("請先在頁面頂部輸入 Google Maps API Key"); return; }
        if (!origin || !destination) { setError("請選擇出發地和目的地"); return; }
        if (origin === destination) { setError("出發地與目的地不能相同"); return; }
        setLoading(true); setError(""); setResult(null);
        try {
          const gMode = mode === "bus" ? "transit" : mode;
          const url = `https://maps.googleapis.com/maps/api/directions/json?origin=${encodeURIComponent(origin)},東京&destination=${encodeURIComponent(destination)},東京&mode=${gMode}&language=zh-TW&region=JP&key=${apiKey}`;
          const res = await fetch(url);
          const data = await res.json();
          if (data.status === "OK" && data.routes.length > 0) {
            const leg = data.routes[0].legs[0];
            const steps = leg.steps || [];
            const transitSteps = steps.filter(s => s.travel_mode === "TRANSIT");
            setResult({
              duration: leg.duration.text,
              distance: leg.distance.text,
              transfers: Math.max(0, transitSteps.length - 1),
              fare: data.routes[0].fare
                ? `${data.routes[0].fare.currency} ${data.routes[0].fare.value}`
                : "依實際搭乘計算"
            });
          } else if (data.status === "REQUEST_DENIED") {
            setError("API Key 無效或未啟用 Directions API，請確認後重試");
          } else {
            setError(`查無路線（${data.status}），請確認地點名稱`);
          }
        } catch(e) {
          setError("查詢失敗：" + e.message);
        }
        setLoading(false);
      };

      const openMaps = () => {
        const gMode = mode === "bus" ? "transit" : mode;
        const url = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&travelmode=${gMode}&hl=zh-TW`;
        window.open(url, "_blank");
      };

      return (
        <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4 fade-in" onClick={onClose}>
          <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden" onClick={e => e.stopPropagation()}>
            <div className="bg-blue-900 text-white px-5 py-4 flex justify-between items-center">
              <div>
                <h3 className="font-bold text-lg">🗺 交通查詢</h3>
                <p className="text-blue-200 text-xs mt-0.5">{day.dayNum} · {day.date}（{day.weekday}）</p>
              </div>
              <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-blue-800 text-white text-xl font-bold transition-colors">✕</button>
            </div>
            <div className="p-5 space-y-4">
              <div>
                <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5 block">出發地</label>
                <select className="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-500 focus:outline-none transition-colors bg-white"
                  value={origin} onChange={e => setOrigin(e.target.value)}>
                  <option value={day.hotel}>{day.hotel}（今日住宿）</option>
                  {day.spots.filter(s => s !== day.hotel).map((s, i) => <option key={i} value={s}>{s}</option>)}
                </select>
              </div>
              <div>
                <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5 block">目的地</label>
                <select className="w-full border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-blue-500 focus:outline-none transition-colors bg-white"

    //  DAY CARD

    function DayCard({ day, editMode, onUpdate, apiKey }) {
      const [expanded, setExpanded] = useState(false);
      const [showModal, setShowModal] = useState(false);

      const badgeColor = BADGE_COLORS[(day.id - 1) % BADGE_COLORS.length];

      const editField = (field, val) => onUpdate(day.id, field, val);

      const sortByTime = (steps) => [...steps].sort((a, b) => {
        const toMin = t => { const [h, m] = (t || "00:00").split(":").map(Number); return h * 60 + (m || 0); };
        return toMin(a.time) - toMin(b.time);
      });

      const updateStep = (i, key, val) => {
        const next = day.steps.map((s, idx) => idx === i ? { ...s, [key]: val } : s);
        // 修改時間時即時重新排序
        onUpdate(day.id, "steps", key === "time" ? sortByTime(next) : next);
      };
      const addStep = () => onUpdate(day.id, "steps", sortByTime([...day.steps, { time: "00:00", activity: "新活動" }]));
      const delStep = (i) => onUpdate(day.id, "steps", day.steps.filter((_, idx) => idx !== i));

      const updateReminder = (i, val) => onUpdate(day.id, "reminders", day.reminders.map((r, idx) => idx === i ? val : r));
      const addReminder    = () => onUpdate(day.id, "reminders", [...day.reminders, "新提醒事項"]);

                  value={day.transport} onChange={e => editField("transport", e.target.value)} />
              : <p className="text-sm text-gray-700">{day.transport}</p>}
          </div>
          <div className="bg-gray-50 rounded-xl p-3">
            <div className="text-xs font-bold text-gray-600 mb-2">📍 行程步驟</div>
            <div className="space-y-2">

                    <>

                      <input type="text" className="flex-1 border-b border-gray-300 bg-white rounded px-1 text-sm text-gray-700 focus:outline-none"
                        value={step.activity} onChange={e => updateStep(i, "activity", e.target.value)} />
                      <button onClick={() => delStep(i)} className="text-red-400 hover:text-red-600 text-sm flex-shrink-0 font-bold">✕</button>
                    </>

                    <>

              <div className="space-y-1.5">
                {day.reminders.map((r, i) => (
                  <div key={i} className="flex items-start gap-1.5">
                    <span className="text-yellow-500 text-xs mt-0.5 flex-shrink-0">•</span>
                    {editMode ? (
                      <>
                        <input type="text" className="flex-1 border-b border-yellow-300 bg-white rounded px-1 text-xs focus:outline-none"
                          value={r} onChange={e => updateReminder(i, e.target.value)} />
                        <button onClick={() => delReminder(i)} className="text-red-400 hover:text-red-600 text-xs font-bold">✕</button>
                      </>
                    ) : (
                      <span className="text-xs text-yellow-800 leading-relaxed">{r}</span>

                ))}

          </div>

          ) : (
            <h3 className="font-bold text-sm text-gray-800 leading-snug">{day.theme}</h3>
          )}
        </div>
      );

      return (
        <>
          {/* Desktop Card */}
          <div className={`hidden md:flex flex-col bg-white rounded-2xl shadow-md overflow-hidden h-full transition-shadow hover:shadow-lg ${day.special ? "ring-2 ring-emerald-400" : ""}`}>
            <CardHeader />
            <CardBody />
            <div className="px-4 pb-4 pt-2 border-t border-gray-100 flex-shrink-0">
              <button onClick={() => setShowModal(true)}
                className="w-full bg-blue-900 text-white py-2 rounded-xl text-xs font-bold hover:bg-blue-800 transition-colors">
                🗺 查詢交通
              </button>
            </div>
          </div>

          {/* Mobile Card */}
          <div className={`md:hidden bg-white rounded-2xl shadow-md overflow-hidden ${day.special ? "ring-2 ring-emerald-400" : ""}`}>
            <button className="w-full text-left" onClick={() => setExpanded(!expanded)}>
              <div className="px-4 py-3 flex items-center justify-between gap-2">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className={`${badgeColor} text-white text-xs font-bold px-2.5 py-0.5 rounded-full`}>{day.dayNum}</span>
                  <span className="text-gray-500 text-xs">{day.date}（{day.weekday}）</span>
                  {day.special && <span className="bg-emerald-100 text-emerald-700 text-xs px-2 py-0.5 rounded-full">✨</span>}
                </div>
                <div className="flex items-center gap-2 min-w-0">
                  <span className="text-sm font-semibold text-gray-800 truncate">{day.theme}</span>
                  <span className="text-gray-400 text-sm flex-shrink-0">{expanded ? "▲" : "▼"}</span>
                </div>
              </div>
            </button>
            {expanded && (
              <div className="fade-in" onClick={e => e.stopPropagation()}>
                <div className="px-4 pb-4 space-y-3">
                  <div className="bg-blue-50 rounded-xl p-3">
                    <div className="text-xs font-bold text-blue-700 mb-1">🏨 住宿</div>
                    <p className="text-sm text-gray-700">{day.hotel}</p>

                  <div className="bg-violet-50 rounded-xl p-3">
                    <div className="text-xs font-bold text-violet-700 mb-1">🚇 交通</div>
                    <p className="text-sm text-gray-700">{day.transport}</p>
                  </div>
                  <div className="bg-gray-50 rounded-xl p-3">
                    <div className="text-xs font-bold text-gray-600 mb-2">📍 行程步驟</div>
                    <div className="space-y-2">
                      {day.steps.map((step, i) => (
                        <div key={i} className="flex items-start gap-2 pl-3">
                          <div className="w-1.5 h-1.5 bg-blue-400 rounded-full mt-2 flex-shrink-0"></div>
                          <span className="text-xs font-mono text-blue-600 font-bold w-12 flex-shrink-0">{step.time}</span>
                          <span className="text-sm text-gray-700">{step.activity}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  {day.reminders.length > 0 && (
                    <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-3">
                      <div className="text-xs font-bold text-yellow-700 mb-1.5">💡 提醒</div>
                      {day.reminders.map((r, i) => (
                        <div key={i} className="flex items-start gap-1.5 mb-1">
                          <span className="text-yellow-500 text-xs mt-0.5">•</span>
                          <span className="text-xs text-yellow-800">{r}</span>
                        </div>
                      ))}

                  )}
                  <button onClick={() => setShowModal(true)}
                    className="w-full bg-blue-900 text-white py-2.5 rounded-xl text-sm font-bold hover:bg-blue-800 transition-colors">
                    🗺 查詢交通

    // ======================================================
    //  APP
    // ======================================================
    function App() {
      const [data, setData] = useState(() => {
        try {
          const saved = localStorage.getItem("tokyo-trip-2026");
          return saved ? JSON.parse(saved) : DEFAULT_DATA;
        } catch { return DEFAULT_DATA; }
      });
      const [editMode, setEditMode]     = useState(false);
      const [apiKey, setApiKey]         = useState(() => localStorage.getItem("gmaps-key") || "");
      const [showApiBar, setShowApiBar] = useState(false);
      const [ghToken, setGhToken]       = useState(() => localStorage.getItem("gh-token") || "");
      const [showGhBar, setShowGhBar]   = useState(false);
      const [publishing, setPublishing] = useState(false);
      const [toast, setToast]           = useState("");
      const importRef = useRef(null);

      const GH_OWNER  = "immioliang-collab";
      const GH_REPO   = "okyo-trip-2026";
      const GH_BRANCH = "main";
      const GH_PATH   = "index.html";

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 3000); };

      const updateDay = useCallback((dayId, field, value) => {
        setData(prev => ({
          ...prev,
          days: prev.days.map(d => d.id === dayId ? { ...d, [field]: value } : d)
        }));
      }, []);

      const saveData = () => {
        localStorage.setItem("tokyo-trip-2026", JSON.stringify(data));
        if (apiKey) localStorage.setItem("gmaps-key", apiKey);
        showToast("✅ 已儲存至瀏覽器");
      };

      const exportJSON = () => {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const a = Object.assign(document.createElement("a"), {
          href: URL.createObjectURL(blob),
          download: "tokyo-trip-2026.json"
        });
        a.click();
        URL.revokeObjectURL(a.href);
        showToast("📤 已匯出 JSON 檔案");
      };

      const importJSON = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const imported = JSON.parse(ev.target.result);
            if (!imported.days || !imported.segments) throw new Error("格式錯誤");
            setData(imported);
            showToast("📥 匯入成功！");
          } catch { showToast("❌ 檔案格式錯誤，請確認 JSON 結構"); }
        };
        reader.readAsText(file);
        e.target.value = "";
      };

      const resetData = () => {
        if (!window.confirm("確定要重置所有資料？此操作無法復原。")) return;
        setData(DEFAULT_DATA);
        localStorage.removeItem("tokyo-trip-2026");
        showToast("🔄 已重置為預設資料");
      };

      const confirmApiKey = () => {
        if (apiKey) { localStorage.setItem("gmaps-key", apiKey); showToast("🔑 API Key 已儲存"); }
        setShowApiBar(false);
      };

      const confirmGhToken = () => {
        if (ghToken) { localStorage.setItem("gh-token", ghToken); showToast("🔐 GitHub Token 已儲存"); }
        setShowGhBar(false);
      };

      const publishToGitHub = async () => {
        if (!ghToken) { setShowGhBar(true); showToast("⚠️ 請先設定 GitHub Token"); return; }
        setPublishing(true);
        try {
          const apiBase = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`;
          const headers = {
            "Authorization": `token ${ghToken}`,
            "Accept": "application/vnd.github+json",
            "Content-Type": "application/json"
          };
          // 1. 取得目前檔案 SHA 和內容（正確解碼 UTF-8）
          const getRes = await fetch(`${apiBase}?ref=${GH_BRANCH}`, { headers });
          if (!getRes.ok) throw new Error(`無法取得檔案 (${getRes.status})，請確認 Token 權限`);
          const fileInfo = await getRes.json();
          const currentContent = decodeURIComponent(escape(atob(fileInfo.content.replace(/\n/g, ""))));

          // 2. 替換 DEFAULT_DATA 區塊
          const newDataStr = `const DEFAULT_DATA = ${JSON.stringify(data, null, 2)};`;
          const updated = currentContent.replace(
            /\/\/ __DATA_START__[\s\S]*?\/\/ __DATA_END__/,
            `// __DATA_START__\n    ${newDataStr}\n    // __DATA_END__`
          );

          // 3. 正確 UTF-8 編碼後推上 GitHub
          const encoded = btoa(unescape(encodeURIComponent(updated)));
          const putRes = await fetch(apiBase, {
            method: "PUT",
            headers,
            body: JSON.stringify({
              message: `✏️ 更新行程 ${new Date().toLocaleString("zh-TW")}`,
              content: encoded,
              sha: fileInfo.sha,
              branch: GH_BRANCH
            })
          });
          if (!putRes.ok) {
            const err = await putRes.json();
            throw new Error(err.message || `推送失敗 (${putRes.status})`);
          }
          showToast("🚀 已發布到 GitHub！家人重新整理即可看到新版");
        } catch(e) {
          showToast("❌ " + e.message);
        }
        setPublishing(false);
      };

      const getDaysForSegment = (segId) => data.days.filter(d => d.segment === segId);

      return (
        <div className="min-h-screen bg-slate-100">
          {/* HEADER */}
          <header className="bg-blue-900 text-white shadow-xl sticky top-0 z-40">
            <div className="max-w-6xl mx-auto px-4 py-4">
              <div className="flex flex-wrap items-center justify-between gap-3">
                <div>
                  <h1 className="text-lg md:text-2xl font-bold tracking-tight">{data.tripInfo.title}</h1>
                  <p className="text-blue-300 text-xs md:text-sm mt-0.5">
                    📅 {data.tripInfo.dates} &nbsp;·&nbsp;
                    📆 {data.tripInfo.totalDays} 天 &nbsp;·&nbsp;
                    👨‍👩‍👧‍👦 {data.tripInfo.passengers}
                  </p>
                </div>
                <div className="flex flex-wrap items-center gap-2">
                  <button onClick={() => setShowApiBar(!showApiBar)}
                    className={`text-xs px-3 py-1.5 rounded-lg font-semibold transition-colors ${apiKey ? "bg-emerald-600 hover:bg-emerald-700" : "bg-yellow-400 text-gray-900 hover:bg-yellow-300"}`}>
                    🔑 {apiKey ? "API 已設定" : "設定 API Key"}
                  </button>
                  <button onClick={() => setEditMode(!editMode)}
                    className={`text-xs px-3 py-1.5 rounded-lg font-semibold transition-colors ${editMode ? "bg-orange-500 hover:bg-orange-600" : "bg-white text-blue-900 hover:bg-blue-50"}`}>
                    {editMode ? "✏️ 退出編輯" : "✏️ 編輯模式"}
                  </button>
                  {editMode && <>
                    <button onClick={saveData} className="text-xs px-3 py-1.5 bg-emerald-500 hover:bg-emerald-600 rounded-lg font-semibold transition-colors">💾 儲存</button>
                    <button onClick={exportJSON} className="text-xs px-3 py-1.5 bg-violet-500 hover:bg-violet-600 rounded-lg font-semibold transition-colors">📤 匯出</button>
                    <button onClick={() => importRef.current?.click()} className="text-xs px-3 py-1.5 bg-indigo-500 hover:bg-indigo-600 rounded-lg font-semibold transition-colors">📥 匯入</button>
                    <input ref={importRef} type="file" accept=".json" className="hidden" onChange={importJSON} />
                    <button onClick={() => setShowGhBar(!showGhBar)}
                      className={`text-xs px-3 py-1.5 rounded-lg font-semibold transition-colors ${ghToken ? "bg-gray-600 hover:bg-gray-700" : "bg-pink-500 hover:bg-pink-600"}`}>
                      🔐 {ghToken ? "Token 已設定" : "設定 Token"}
                    </button>
                    <button onClick={publishToGitHub} disabled={publishing}
                      className="text-xs px-3 py-1.5 bg-rose-500 hover:bg-rose-600 disabled:opacity-60 rounded-lg font-semibold transition-colors flex items-center gap-1">
                      {publishing
                        ? <><span className="w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin inline-block"></span> 發布中...</>
                        : "🚀 發布到 GitHub"}
                    </button>
                  </>}
                </div>
              </div>

              {/* API Key 輸入列 */}
              {showApiBar && (
                <div className="mt-3 flex gap-2 fade-in">
                  <input type="password" placeholder="貼上 Google Maps Directions API Key..."
                    value={apiKey} onChange={e => setApiKey(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && confirmApiKey()}
                    className="flex-1 px-3 py-2 rounded-xl text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400" />
                  <button onClick={confirmApiKey}
                    className="bg-yellow-400 text-gray-900 px-4 py-2 rounded-xl text-sm font-bold hover:bg-yellow-300 transition-colors">確認</button>
                </div>
              )}

              {/* GitHub Token 輸入列 */}
              {showGhBar && (
                <div className="mt-3 space-y-2 fade-in">
                  <div className="flex gap-2">
                    <input type="password" placeholder="貼上 GitHub Personal Access Token（需要 Contents 寫入權限）..."
                      value={ghToken} onChange={e => setGhToken(e.target.value)}
                      onKeyDown={e => e.key === "Enter" && confirmGhToken()}
                      className="flex-1 px-3 py-2 rounded-xl text-gray-900 text-sm focus:outline-none focus:ring-2 focus:ring-pink-400" />
                    <button onClick={confirmGhToken}
                      className="bg-pink-400 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-pink-300 transition-colors">確認</button>
                  </div>
                  <p className="text-blue-200 text-xs">
                    💡 到 <a href="https://github.com/settings/tokens/new?scopes=repo&description=tokyo-trip" target="_blank" className="underline text-yellow-300">github.com/settings/tokens</a> 產生 Token，勾選 <strong>repo</strong> 權限
                  </p>
                </div>
              )}
            </div>
          </header>

          {/* TOAST */}
          {toast && (
            <div className="fixed top-20 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-5 py-3 rounded-2xl shadow-xl z-50 text-sm font-semibold fade-in">
              {toast}
            </div>
          )}

          {/* MAIN */}
          <main className="max-w-6xl mx-auto px-4 py-6">
            {data.segments.map(segment => (
              <section key={segment.id}>
                <SegmentBanner segment={segment} />
                <div className="hidden md:grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                  {getDaysForSegment(segment.id).map(day => (
                    <div key={day.id} className="min-h-[520px] flex flex-col">
                      <DayCard day={day} editMode={editMode} onUpdate={updateDay} apiKey={apiKey} />
                    </div>
                  ))}
                </div>
                <div className="md:hidden space-y-3">
                  {getDaysForSegment(segment.id).map(day => (
                    <DayCard key={day.id} day={day} editMode={editMode} onUpdate={updateDay} apiKey={apiKey} />
                  ))}
                </div>
              </section>
            ))}

            <footer className="mt-12 text-center text-gray-400 text-sm pb-8">
              <p>🇯🇵 2026 東京親子旅遊 &nbsp;·&nbsp; 祝旅途平安愉快！✈️</p>
              {editMode && (
                <button onClick={resetData} className="mt-2 text-red-400 hover:text-red-600 text-xs underline">
                  🔄 重置為預設資料
                </button>
              )}
            </footer>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
